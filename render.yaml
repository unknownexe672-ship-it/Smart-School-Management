services:
  - type: web
    name: amira-api
    env: node
    plan: starter
    buildCommand: pnpm install --no-frozen-lockfile && pnpm --filter @workspace/api-server build
    startCommand: pnpm --filter @workspace/api-server start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
