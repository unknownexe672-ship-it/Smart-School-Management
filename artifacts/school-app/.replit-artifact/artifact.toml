kind = "web"
previewPath = "/"
title = "Smart School Management"
version = "1.0.0"
id = "artifacts/school-app"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20504

[services.development]
run = "pnpm --filter @workspace/school-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/school-app", "run", "build" ]
serve = "static"
publicDir = "artifacts/school-app/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20504"
BASE_PATH = "/"
